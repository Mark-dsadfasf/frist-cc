<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习计时器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0d0d12;
      --bg-card: #16161d;
      --accent-warm: #ff7b54;
      --accent-coral: #ffb26b;
      --accent-glow: rgba(255, 123, 84, 0.4);
      --text-primary: #faf9f7;
      --text-secondary: #a8a5a0;
      --text-muted: #6b6862;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --ring-track: rgba(255, 255, 255, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg-deep);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* Atmospheric background */
    .atmosphere {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .atmosphere::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(255, 123, 84, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(255, 178, 107, 0.08) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 50%, rgba(255, 123, 84, 0.05) 0%, transparent 60%);
      animation: atmosphereBreath 8s ease-in-out infinite;
    }
    @keyframes atmosphereBreath {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    /* Subtle grain texture */
    .atmosphere::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.03;
      mix-blend-mode: overlay;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .card {
      background: var(--bg-card);
      border-radius: 32px;
      padding: 2.5rem 2rem;
      border: 1px solid var(--border-subtle);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.03) inset;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-coral) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand .subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .stats {
      text-align: right;
    }
    .stats-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .stats-value {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent-warm);
      line-height: 1;
      text-shadow: 0 0 30px var(--accent-glow);
    }

    /* Phase indicator */
    .phase-container {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .phase-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .phase-tag.focus {
      background: linear-gradient(135deg, rgba(255, 123, 84, 0.2), rgba(255, 178, 107, 0.1));
      color: var(--accent-coral);
      box-shadow: 0 0 30px rgba(255, 123, 84, 0.2);
    }
    .phase-tag.shortBreak {
      background: linear-gradient(135deg, rgba(72, 199, 142, 0.2), rgba(72, 199, 142, 0.1));
      color: #48c78e;
      box-shadow: 0 0 30px rgba(72, 199, 142, 0.15);
    }
    .phase-tag.longBreak {
      background: linear-gradient(135deg, rgba(72, 199, 142, 0.25), rgba(50, 180, 100, 0.15));
      color: #32b450;
      box-shadow: 0 0 30px rgba(50, 180, 100, 0.2);
    }
    .phase-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: phasePulse 2s ease-in-out infinite;
    }
    @keyframes phasePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Timer display */
    .timer-zone {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 2rem;
    }
    .timer-ring {
      width: 240px;
      height: 240px;
      position: relative;
    }
    .timer-ring svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .ring-bg {
      fill: none;
      stroke: var(--ring-track);
      stroke-width: 6;
    }
    .ring-progress {
      fill: none;
      stroke: url(#ringGradient);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
      filter: drop-shadow(0 0 12px var(--accent-glow));
    }
    .ring-glow {
      fill: none;
      stroke: url(#ringGradient);
      stroke-width: 20;
      stroke-linecap: round;
      opacity: 0.15;
      transition: stroke-dashoffset 1s linear;
    }

    .timer-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .time-display {
      font-family: 'Playfair Display', serif;
      font-size: 3.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .time-suffix {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--text-muted);
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    /* Breathing animation when running */
    .timer-zone.running .time-display {
      animation: timeBreath 4s ease-in-out infinite;
    }
    @keyframes timeBreath {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    .timer-zone.running .ring-progress {
      animation: ringPulse 4s ease-in-out infinite;
    }
    @keyframes ringPulse {
      0%, 100% { filter: drop-shadow(0 0 12px var(--accent-glow)); }
      50% { filter: drop-shadow(0 0 25px var(--accent-glow)); }
    }

    /* Controls */
    .controls {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
    }
    .btn {
      padding: 0.875rem 1.5rem;
      border: none;
      border-radius: 16px;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .btn:hover::before {
      opacity: 1;
    }
    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-warm) 0%, #ff9066 100%);
      color: #fff;
      min-width: 120px;
      box-shadow: 0 8px 30px rgba(255, 123, 84, 0.35);
    }
    .btn-primary:hover {
      box-shadow: 0 12px 40px rgba(255, 123, 84, 0.5);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      border-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    /* Settings */
    .settings {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-subtle);
    }
    .settings-title {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
    }
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }
    .setting-item {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .setting-item label {
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .setting-item input {
      width: 100%;
      padding: 0.6rem 0.5rem;
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-primary);
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.9rem;
      text-align: center;
      transition: all 0.25s ease;
    }
    .setting-item input:focus {
      outline: none;
      border-color: var(--accent-warm);
      background: rgba(255, 123, 84, 0.08);
      box-shadow: 0 0 20px rgba(255, 123, 84, 0.15);
    }

    /* Sound toggle */
    .sound-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-subtle);
    }
    .sound-toggle label {
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
    }
    .sound-toggle input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent-warm);
      cursor: pointer;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.25rem;
        border-radius: 24px;
      }
      .timer-ring {
        width: 200px;
        height: 200px;
      }
      .time-display {
        font-size: 3rem;
      }
      .settings-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="atmosphere"></div>
  <div class="app">
    <div class="card">
      <header class="header">
        <div class="brand">
          <h1>学习计时器</h1>
          <span class="subtitle">专注 · 节律 · 成长</span>
        </div>
        <div class="stats">
          <div class="stats-label">今日番茄</div>
          <div class="stats-value" id="pomodoroCount">0</div>
        </div>
      </header>

      <div class="phase-container">
        <span class="phase-tag focus" id="phaseTag">
          <span class="phase-dot"></span>
          <span id="phaseLabel">专注时间</span>
        </span>
      </div>

      <div class="timer-zone" id="timerZone">
        <div class="timer-ring">
          <svg viewBox="0 0 200 200">
            <defs>
              <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#ff7b54"/>
                <stop offset="100%" style="stop-color:#ffb26b"/>
              </linearGradient>
            </defs>
            <circle class="ring-bg" cx="100" cy="100" r="90"/>
            <circle class="ring-glow" id="ringGlow" cx="100" cy="100" r="90"/>
            <circle class="ring-progress" id="ringProgress" cx="100" cy="100" r="90"/>
          </svg>
          <div class="timer-content">
            <div class="time-display" id="timeDisplay">25:00</div>
            <div class="time-suffix" id="timeSuffix">分钟</div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-secondary" id="resetBtn">重置</button>
        <button class="btn btn-primary" id="startBtn">开始</button>
        <button class="btn btn-secondary" id="skipBtn">跳过</button>
      </div>

      <div class="settings">
        <div class="settings-title">设置</div>
        <div class="settings-grid">
          <div class="setting-item">
            <label>专注 (分钟)</label>
            <input type="number" id="focusTime" min="1" max="60" value="25">
          </div>
          <div class="setting-item">
            <label>短休息</label>
            <input type="number" id="shortBreakTime" min="1" max="30" value="5">
          </div>
          <div class="setting-item">
            <label>长休息</label>
            <input type="number" id="longBreakTime" min="1" max="60" value="25">
          </div>
        </div>
        <div class="sound-toggle">
          <input type="checkbox" id="soundToggle" checked>
          <label for="soundToggle">提示音</label>
        </div>
      </div>
    </div>
  </div>

  <script>
    const PHASE_CONFIG = {
      focus: { duration: 25 * 60, label: '专注时间', tagClass: 'focus' },
      shortBreak: { duration: 5 * 60, label: '短休息', tagClass: 'shortBreak' },
      longBreak: { duration: 25 * 60, label: '长休息', tagClass: 'longBreak' }
    };
    const RING_CIRCUMFERENCE = 2 * Math.PI * 90;

    let state = {
      phase: 'focus',
      timeLeft: PHASE_CONFIG.focus.duration,
      isRunning: false,
      pomodorosCompleted: 0,
      soundEnabled: true
    };

    let timerInterval = null;

    // DOM elements
    const $ = id => document.getElementById(id);
    const timerZone = $('timerZone');
    const timeDisplay = $('timeDisplay');
    const timeSuffix = $('timeSuffix');
    const phaseTag = $('phaseTag');
    const phaseLabel = $('phaseLabel');
    const pomodoroCount = $('pomodoroCount');
    const ringProgress = $('ringProgress');
    const ringGlow = $('ringGlow');
    const startBtn = $('startBtn');
    const resetBtn = $('resetBtn');
    const skipBtn = $('skipBtn');
    const soundToggle = $('soundToggle');
    const focusInput = $('focusTime');
    const shortBreakInput = $('shortBreakTime');
    const longBreakInput = $('longBreakTime');

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function updateRing(progress) {
      const offset = RING_CIRCUMFERENCE * (1 - progress);
      ringProgress.style.strokeDasharray = RING_CIRCUMFERENCE;
      ringProgress.style.strokeDashoffset = offset;
      ringGlow.style.strokeDasharray = RING_CIRCUMFERENCE;
      ringGlow.style.strokeDashoffset = offset;
    }

    function updateUI() {
      const config = PHASE_CONFIG[state.phase];
      const progress = (config.duration - state.timeLeft) / config.duration;

      timeDisplay.textContent = formatTime(state.timeLeft);
      pomodoroCount.textContent = state.pomodorosCompleted;

      phaseTag.className = `phase-tag ${config.tagClass}`;
      phaseLabel.textContent = config.label;

      timerZone.classList.toggle('running', state.isRunning);
      startBtn.textContent = state.isRunning ? '暂停' : '开始';

      updateRing(progress);
    }

    function getNextPhase() {
      if (state.phase === 'focus') {
        return (state.pomodorosCompleted + 1) % 4 === 0 ? 'longBreak' : 'shortBreak';
      }
      return 'focus';
    }

    function playSound() {
      if (!state.soundEnabled) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, ctx.currentTime);
        osc.frequency.setValueAtTime(659, ctx.currentTime + 0.15);
        osc.frequency.setValueAtTime(784, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.6);
      } catch (e) {}
    }

    function sendNotification() {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'granted') {
        const messages = {
          focus: '专注时间结束！休息一下吧～',
          shortBreak: '短休息结束！继续专注',
          longBreak: '长休息结束！开始新的学习'
        };
        new Notification('学习计时器', { body: messages[state.phase] });
      }
    }

    function tick() {
      if (state.timeLeft <= 1) {
        clearInterval(timerInterval);
        timerInterval = null;
        state.isRunning = false;
        playSound();
        sendNotification();

        if (state.phase === 'focus') {
          state.pomodorosCompleted++;
        }
        state.phase = getNextPhase();
        state.timeLeft = PHASE_CONFIG[state.phase].duration;
        updateUI();
        return;
      }
      state.timeLeft--;
      updateUI();
    }

    function handleStartPause() {
      if (state.isRunning) {
        clearInterval(timerInterval);
        timerInterval = null;
        state.isRunning = false;
      } else {
        state.isRunning = true;
        timerInterval = setInterval(tick, 1000);
      }
      updateUI();
    }

    function handleReset() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      state.isRunning = false;
      state.timeLeft = PHASE_CONFIG[state.phase].duration;
      updateUI();
    }

    function handleSkip() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      if (state.phase === 'focus') {
        state.pomodorosCompleted++;
      }
      state.phase = getNextPhase();
      state.timeLeft = PHASE_CONFIG[state.phase].duration;
      state.isRunning = false;
      updateUI();
    }

    function updateDurations() {
      PHASE_CONFIG.focus.duration = (parseInt(focusInput.value) || 25) * 60;
      PHASE_CONFIG.shortBreak.duration = (parseInt(shortBreakInput.value) || 5) * 60;
      PHASE_CONFIG.longBreak.duration = (parseInt(longBreakInput.value) || 25) * 60;
      if (!state.isRunning) {
        state.timeLeft = PHASE_CONFIG[state.phase].duration;
        updateUI();
      }
    }

    // Event bindings
    startBtn.addEventListener('click', handleStartPause);
    resetBtn.addEventListener('click', handleReset);
    skipBtn.addEventListener('click', handleSkip);
    soundToggle.addEventListener('change', e => state.soundEnabled = e.target.checked);
    focusInput.addEventListener('change', updateDurations);
    shortBreakInput.addEventListener('change', updateDurations);
    longBreakInput.addEventListener('change', updateDurations);

    // Initialize notification permission
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    updateUI();
  </script>
</body>
</html>
