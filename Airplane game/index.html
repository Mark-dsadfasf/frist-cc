<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Airplane Game - 飞机射击</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="480" height="640"></canvas>

        <div id="startScreen" class="overlay">
            <h1>飞机射击</h1>
            <h2>AIRPLANE SHOOTER</h2>
            <p>方向键/WASD 移动</p>
            <p>空格键/Z 射击</p>
            <p>消灭敌机得分</p>
            <button class="btn" onclick="game.start()">开始游戏</button>
            <p class="controls-hint">按 ENTER 开始</p>
        </div>

        <div id="gameOverScreen" class="overlay hidden">
            <h1>游戏结束</h1>
            <h2>GAME OVER</h2>
            <div class="score-display">得分: <span id="finalScore">0</span></div>
            <button class="btn" onclick="game.restart()">再来一次</button>
            <p class="controls-hint">按 ENTER 重新开始</p>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
